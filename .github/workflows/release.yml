name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate resources (icon + manifest)
        run: go generate ./cmd

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build exe
        run: go build -ldflags="-H windowsgui -s -w" -o "build/Zapret Tray Manager.exe" ./cmd

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.version.outputs.VERSION }}" `
            installer.iss

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Zapret Tray Manager-${{ steps.version.outputs.VERSION }}-setup.exe
          generate_release_notes: true
