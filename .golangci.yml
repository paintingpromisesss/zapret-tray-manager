version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none

  enable:
    # Base / correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    # Error handling
    - errorlint
    - err113
    - nilerr
    - nilnil
    - wrapcheck

    # Security
    - gosec

    # HTTP / context / resources
    - bodyclose
    - noctx
    - contextcheck
    - containedctx

    # Code quality
    - revive
    - gocritic
    - prealloc
    - unconvert
    - unparam
    - wastedassign
    - misspell
    - whitespace

    # Complexity / maintainability
    - gocyclo
    - cyclop
    - funlen
    - nestif
    - maintidx

    # API / style consistency
    - ireturn
    - interfacebloat
    - importas
    - godot
    - nakedret
    - nonamedreturns
    - usestdlibvars

    # Tests
    - testifylint
    - testpackage
    - tparallel
    - paralleltest

    # Bugs around slices/maps/copies
    - copyloopvar
    - makezero
    - reassign
    - dogsled
    - dupword

  settings:
    errcheck:
      check-type-assertions: true
      # check-blank stays off: deliberate `_ = f.Close()` on read-only handles and
      # best-effort cleanup is idiomatic and need not be re-handled.
      check-blank: false

    govet:
      enable-all: true
      # fieldalignment is a memory-layout micro-optimization; pointless for the
      # single-instance structs in this GUI app and only adds churn.
      disable:
        - fieldalignment

    revive:
      severity: warning
      rules:
        - name: unused-parameter
        - name: var-naming
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: receiver-naming
        - name: indent-error-flow
        - name: early-return
        - name: blank-imports
        - name: superfluous-else
        - name: unreachable-code

    wrapcheck:
      # Errors crossing our own internal package boundaries are already wrapped
      # with context at their source; re-wrapping thin delegators adds only noise.
      ignore-package-globs:
        - zapret-tray-manager/internal/*

    gosec:
      excludes: []

    gocyclo:
      min-complexity: 12

    cyclop:
      max-complexity: 12
      package-average: 6.0

    funlen:
      lines: 80
      statements: 50
      ignore-comments: true

    nestif:
      min-complexity: 4

    maintidx:
      under: 20

    interfacebloat:
      max: 5

    godot:
      scope: declarations
      period: true
      capital: true

    nakedret:
      max-func-lines: 0

    misspell:
      locale: US

    importas:
      no-unaliased: false
      alias: []

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gosec
          - errcheck
          - wrapcheck
          - cyclop
          - gocyclo
          - maintidx

      - path: cmd/.*/main\.go
        linters:
          - funlen
          - gocyclo
          - cyclop

      - path: ".*\\.pb\\.go"
        linters:
          - revive
          - govet
          - staticcheck
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports